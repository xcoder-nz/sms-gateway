<!doctype html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="/static/demo.css" />
</head>
<body>
<div class="container">
  <h1>Admin Dashboard <span class="badge demo">DEMO</span> <span class="badge sim">SIMULATED</span></h1>

  <div class="grid">
    <section class="card">
      <h3>Summary Cards</h3>
      <p>Total Wallet Float: <b>{{total_float}}</b> <span class="badge demo">DEMO</span></p>
      <p>Wallets: <b>{{wallets|length}}</b></p>
      <div id="txn-detail" class="small">Transaction detail view (DEMO/SIMULATED).</div>
    </section>

    <section class="card">
      <h3>Add Buyer (No Auth)</h3>
      <form id="create-buyer-form" class="stack">
        <label>Full name</label>
        <input name="full_name" required placeholder="Buyer Two" />
        <label>Phone number</label>
        <input name="phone_number" required placeholder="0700999000" />
        <label>PIN</label>
        <input name="pin" value="1234" required />
        <label>Opening balance (AFN)</label>
        <input name="opening_balance" type="number" min="0" value="500" required />
        <button type="submit">Create Buyer</button>
      </form>
      <div id="buyer-create-status" class="small"></div>
    </section>
  </div>

  <div class="grid" style="margin-top:16px;">
    <section class="card">
      <h3>Transaction Table <span class="badge demo">DEMO</span></h3>
      <table><thead><tr><th>Ref</th><th>Type</th><th>Amount</th><th>Status</th><th>Time</th></tr></thead>
        <tbody id="txn-rows"></tbody>
      </table>
    </section>
    <section class="card">
      <h3>SMS Feed <span class="badge sim">SIMULATED</span></h3>
      <table><thead><tr><th>ID</th><th>Dir</th><th>Body</th><th>Time</th></tr></thead>
        <tbody id="sms-history"></tbody>
      </table>
    </section>
  </div>
</div>
<script src="/static/demo.js"></script>
<script>
const form = document.getElementById("create-buyer-form");
if (form) {
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const payload = Object.fromEntries(new FormData(form).entries());
    payload.opening_balance = Number(payload.opening_balance || 0);
    const status = document.getElementById("buyer-create-status");
    try {
      const r = await fetch("/admin/buyers", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload)});
      if (!r.ok) throw new Error(await r.text());
      status.textContent = "Buyer created. Refreshing...";
      setTimeout(()=>window.location.reload(), 400);
    } catch (err) {
      status.textContent = "Failed: " + err.message;
    }
  });
}
</script>
</body>
</html>
